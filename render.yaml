services:
  - type: web
    name: legaleasefile
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_DOMAINS
        value: legaleasefile.onrender.com
      - key: OPENAI_API_KEY
        sync: false
