services:
  # Main Web Service - Simplified for Free Plan
  - type: web
    name: legaleasefile
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # PostgreSQL Database - Free Plan
  - type: pserv
    name: legaleasefile-db
    env: postgresql
    plan: free
    databaseName: legaleasefile
    user: legaleasefile_user
