services:
  - type: web
    name: legaleasefile
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_DOMAINS
        value: legaleasefile.online
      - key: OPENAI_API_KEY
        sync: false
