services:
  - type: web
    name: legaleasefile
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: legaleasefile-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: legaleasefile-db
    databaseName: legaleasefile
    user: legaleasefile_user
