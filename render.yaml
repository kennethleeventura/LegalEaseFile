services:
  - type: web
    name: legaleasefile
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./production.db
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_DOMAINS
        value: legaleasefile.online,www.legaleasefile.online
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
    autoDeploy: true
    rootDir: .
