groups:
  - name: legaleasefile.rules
    rules:
      # Application health alerts
      - alert: ApplicationDown
        expr: up{job="legaleasefile-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LegalEaseFile application is down"
          description: "LegalEaseFile application has been down for more than 1 minute."

      - alert: HighResponseTime
        expr: http_request_duration_seconds{quantile="0.95"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second."

      # Database alerts
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL database has been down for more than 30 seconds."

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Database has {{ $value }} active connections."

      - alert: DatabaseSlowQueries
        expr: pg_stat_activity_max_tx_duration > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "Long running transactions detected ({{ $value }}s)."

      # System resource alerts
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% ({{ $value }}%)."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% ({{ $value }}%)."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% ({{ $value }}% remaining)."

      # Business logic alerts
      - alert: DocumentUploadFailures
        expr: rate(document_upload_failures_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High document upload failure rate"
          description: "Document upload failure rate is {{ $value }} per second."

      - alert: PaymentProcessingErrors
        expr: rate(payment_errors_total[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Payment processing errors detected"
          description: "Payment error rate is {{ $value }} per second."

      - alert: AuthenticationFailures
        expr: rate(auth_failures_total[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failure rate is {{ $value }} per second."

      # Security alerts
      - alert: SuspiciousActivity
        expr: rate(suspicious_requests_total[5m]) > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Suspicious activity detected"
          description: "Suspicious request rate is {{ $value }} per second."

      - alert: TooManyFailedLogins
        expr: increase(failed_login_attempts_total[10m]) > 50
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Too many failed login attempts"
          description: "{{ $value }} failed login attempts in the last 10 minutes."