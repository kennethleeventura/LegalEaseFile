version: '3.8'

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: legaleasefile-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://legalease:${POSTGRES_PASSWORD}@postgres:5432/legaleasefile
      - SESSION_SECRET=${SESSION_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - AIRTABLE_API_KEY=${AIRTABLE_API_KEY}
      - PORT=3000
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

  # PostgreSQL database for production
  postgres:
    image: postgres:15
    container_name: legaleasefile-db
    environment:
      POSTGRES_DB: legaleasefile
      POSTGRES_USER: legalease
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalease123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalease -d legaleasefile"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - app_network

  # Redis for session storage and caching
  redis:
    image: redis:7-alpine
    container_name: legaleasefile-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: legaleasefile-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - app_network

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: legaleasefile-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: legaleasefile-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - app_network

# Named volumes for data persistence
volumes:
  postgres_data:
  app_data:
  app_logs:
  redis_data:
  nginx_logs:
  prometheus_data:
  grafana_data:

# Network for service communication
networks:
  app_network:
    driver: bridge