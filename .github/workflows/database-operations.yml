        uses: actions/github-script@v7
        with:
          script: |
            console.log('🛡️  Production database operation requires manual approval');
            console.log('📋 Verify all tests have passed before proceeding');

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create production backup
        run: |
