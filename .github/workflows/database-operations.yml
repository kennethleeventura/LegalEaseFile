  # ============================================================================
  # REPORTING AND MONITORING
  # ============================================================================

  database-reporting:
    name: Database Operations Report
    runs-on: ubuntu-latest
    needs: [schema-validation, migration-testing, data-integrity, staging-operations]
    if: always()

    steps:
      - name: Generate database operations report
        run: |
          echo "📊 Generating database operations report..."

          echo "# Database Operations Report" > db-report.md
          echo "Date: $(date)" >> db-report.md
          echo "Commit: ${{ github.sha }}" >> db-report.md
          echo "" >> db-report.md

          echo "## Schema Validation" >> db-report.md
          echo "- Status: ${{ needs.schema-validation.result }}" >> db-report.md
          echo "- Migration Required: ${{ needs.schema-validation.outputs.migration-required }}" >> db-report.md
          echo "" >> db-report.md

          echo "## Migration Testing" >> db-report.md
          echo "- Status: ${{ needs.migration-testing.result }}" >> db-report.md
          echo "" >> db-report.md

          echo "## Data Integrity" >> db-report.md
          echo "- Status: ${{ needs.data-integrity.result }}" >> db-report.md
          echo "" >> db-report.md

          echo "## Staging Operations" >> db-report.md
          echo "- Status: ${{ needs.staging-operations.result }}" >> db-report.md

      - name: Upload database report
        uses: actions/upload-artifact@v4
